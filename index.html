<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeuTok</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --accent: #ff2d55;
    --accent2: #00f2ea;
    --text: #f5f5f5;
    --muted: #777;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; height:100dvh; }

  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    background:linear-gradient(to bottom,rgba(10,10,10,.97),transparent);
  }
  .logo {
    font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .nav-btn {
    background:none; border:1.5px solid var(--border); color:var(--text);
    padding:7px 16px; border-radius:20px; font-family:'DM Sans',sans-serif;
    font-size:13px; cursor:pointer; transition:all .2s;
  }
  .nav-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* mute button */
  #muteBtn {
    position:fixed; top:16px; right:80px; z-index:101;
    width:36px; height:36px; border-radius:50%;
    background:rgba(255,255,255,.13); backdrop-filter:blur(10px);
    border:none; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  #muteBtn:hover { background:rgba(255,255,255,.25); }

  /* FEED */
  #feed { height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; }
  #feed::-webkit-scrollbar { display:none; }

  .video-slide {
    height:100dvh; scroll-snap-align:start;
    position:relative; background:#000;
    display:flex; align-items:center; justify-content:center;
  }
  .video-slide video {
    width:100%; height:100%; object-fit:cover;
    position:absolute; inset:0; cursor:pointer;
  }
  .video-slide::after {
    content:''; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(to top,rgba(0,0,0,.78) 0%,transparent 38%,transparent 68%,rgba(0,0,0,.35) 100%);
  }
  .video-info {
    position:absolute; bottom:80px; left:16px; right:80px; z-index:2;
    animation:fadeUp .4s ease;
  }
  .video-title { font-size:15px; font-weight:700; margin-bottom:5px; text-shadow:0 1px 6px rgba(0,0,0,.8); }
  .video-desc  { font-size:13px; color:rgba(255,255,255,.75); line-height:1.4; }

  .side-actions {
    position:absolute; right:14px; bottom:90px; z-index:2;
    display:flex; flex-direction:column; gap:20px; align-items:center;
  }
  .action-btn { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; user-select:none; }
  .action-icon {
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.13); backdrop-filter:blur(10px);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; transition:transform .15s,background .15s;
  }
  .action-btn:active .action-icon { transform:scale(1.25); background:rgba(255,45,85,.4); }
  .action-btn span { font-size:11px; color:rgba(255,255,255,.9); font-weight:500; }

  .progress-bar {
    position:absolute; bottom:0; left:0; height:2px; z-index:3; width:0%;
    background:linear-gradient(to right,var(--accent),var(--accent2));
  }

  .play-indicator {
    position:absolute; font-size:64px; z-index:5; pointer-events:none; opacity:0;
  }
  .play-indicator.pop { animation:fadeOut .55s ease forwards; }

  /* tap to unmute hint */
  #muteHint {
    position:fixed; bottom:40px; left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.65); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.15);
    color:#fff; padding:9px 20px; border-radius:30px;
    font-size:13px; z-index:102;
    animation:fadeUp .4s ease, fadeOut2 .5s ease 3s forwards;
    pointer-events:none; white-space:nowrap;
  }

  /* EMPTY */
  #empty-state {
    display:none; flex-direction:column; align-items:center; justify-content:center;
    height:100dvh; gap:16px; text-align:center; padding:40px;
  }
  #empty-state .big-icon { font-size:64px; }
  #empty-state h2 { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:1px; color:var(--muted); }
  #empty-state p  { font-size:14px; color:var(--muted); line-height:1.7; }
  #empty-state code { background:#1a1a1a; padding:2px 7px; border-radius:5px; color:var(--accent2); font-size:13px; }

  /* MODALS */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); backdrop-filter:blur(12px); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:32px; width:90%; max-width:420px; position:relative; animation:popIn .25s cubic-bezier(.34,1.56,.64,1); }
  .modal h2 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:1px; margin-bottom:6px; }
  .modal p.subtitle { font-size:13px; color:var(--muted); margin-bottom:20px; line-height:1.5; }
  .modal input[type="password"],
  .modal input[type="text"],
  .modal textarea {
    width:100%; background:var(--bg); border:1.5px solid var(--border); color:var(--text);
    padding:12px 16px; border-radius:12px; font-family:'DM Sans',sans-serif;
    font-size:14px; margin-bottom:12px; outline:none; transition:border-color .2s;
  }
  .modal input:focus,.modal textarea:focus { border-color:var(--accent2); }
  .modal textarea { resize:vertical; min-height:70px; }
  .hint { font-size:11px; color:var(--muted); margin-top:-8px; margin-bottom:14px; line-height:1.6; }
  .hint code { background:#1a1a1a; padding:1px 5px; border-radius:4px; color:var(--accent2); }

  .btn-primary {
    width:100%; padding:14px; border:none; border-radius:12px;
    background:linear-gradient(135deg,var(--accent),#ff6b6b); color:#fff;
    font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:1px;
    cursor:pointer; transition:opacity .2s,transform .15s; margin-top:4px;
  }
  .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
  .btn-primary:active { transform:scale(.98); }
  .btn-close { background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; position:absolute; top:16px; right:20px; }
  .error-msg { color:var(--accent); font-size:12px; margin-top:-8px; margin-bottom:10px; display:none; }

  #toast {
    position:fixed; bottom:30px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--surface); border:1px solid var(--border); color:var(--text);
    padding:12px 24px; border-radius:30px; font-size:13px; font-weight:500;
    z-index:999; transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }

  .heart-burst {
    position:absolute; font-size:80px; z-index:10; pointer-events:none;
    left:50%; top:40%; transform:translate(-50%,-50%);
    animation:heartBurst .6s ease forwards;
  }

  @keyframes heartBurst {
    0%   { transform:translate(-50%,-50%) scale(0);   opacity:1; }
    50%  { transform:translate(-50%,-50%) scale(1.3); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(1.5); opacity:0; }
  }
  @keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn   { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
  @keyframes fadeOut { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.4)} }
  @keyframes fadeOut2 { from{opacity:1} to{opacity:0} }
</style>
</head>
<body>

<nav>
  <div class="logo">MeuTok</div>
  <button id="muteBtn" onclick="toggleMute()" title="Ativar/desativar som">🔇</button>
  <button class="nav-btn" id="adminNavBtn" onclick="openLogin()">+ Admin</button>
</nav>

<div id="feed"></div>

<div id="empty-state">
  <div class="big-icon">🎬</div>
  <h2>Nenhum vídeo ainda</h2>
  <p>Faça login como admin e<br>adicione o primeiro vídeo!</p>
</div>

<!-- LOGIN -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="btn-close" onclick="closeLogin()">✕</button>
    <h2>Área Admin</h2>
    <p class="subtitle">Digite a senha para acessar o painel.</p>
    <input type="password" id="adminPass" placeholder="Senha"
      onkeydown="if(event.key==='Enter')checkLogin()"/>
    <div class="error-msg" id="loginError">Senha incorreta!</div>
    <button class="btn-primary" onclick="checkLogin()">ENTRAR</button>
  </div>
</div>

<!-- ADD VIDEO -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <button class="btn-close" onclick="closeUpload()">✕</button>
    <h2>Novo Vídeo</h2>
    <p class="subtitle">Digite o nome do arquivo que está na pasta <code>videos/</code> do repositório.</p>
    <input type="text" id="videoFile" placeholder="meu-video.mp4"/>
    <div class="hint">Ex: <code>festa.mp4</code> — precisa ter o <code>.mp4</code> no final!</div>
    <input type="text" id="videoTitle" placeholder="Título do vídeo"/>
    <textarea id="videoDesc" placeholder="Descrição (opcional)"></textarea>
    <button class="btn-primary" onclick="addVideo()">PUBLICAR</button>
  </div>
</div>

<div id="toast"></div>

<script>
  // ══════════════════════════════════
  //  ⚠️  TROQUE A SENHA ABAIXO
  // ══════════════════════════════════
  const ADMIN_PASSWORD = "joao";
  const VIDEO_FOLDER   = "videos/";

  let videos    = JSON.parse(localStorage.getItem('meutok_local') || '[]');
  let likes     = JSON.parse(localStorage.getItem('meutok_likes') || '{}');
  let isAdmin   = false;
  let isMuted   = true;
  let currentVid = null;
  let hintShown = false;

  // ---------- MUTE ----------
  function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
    if (currentVid) currentVid.muted = isMuted;
  }

  function showMuteHint() {
    if (hintShown) return;
    hintShown = true;
    const hint = document.createElement('div');
    hint.id = 'muteHint';
    hint.textContent = '🔇 Toque em 🔇 para ativar o som';
    document.body.appendChild(hint);
    setTimeout(() => hint.remove(), 4000);
  }

  // ---------- RENDER ----------
  function renderFeed() {
    const feed  = document.getElementById('feed');
    const empty = document.getElementById('empty-state');
    document.getElementById('adminNavBtn').textContent = isAdmin ? '+ Adicionar' : '+ Admin';
    feed.innerHTML = '';

    if (videos.length === 0) {
      feed.style.display  = 'none';
      empty.style.display = 'flex';
      return;
    }
    feed.style.display  = 'block';
    empty.style.display = 'none';

    videos.forEach((v, i) => {
      const likeCount = likes[v.id] || 0;
      const liked     = !!likes['liked_' + v.id];

      const slide = document.createElement('div');
      slide.className     = 'video-slide';
      slide.dataset.index = i;

      slide.innerHTML = `
        <video src="${VIDEO_FOLDER}${v.file}" loop playsinline preload="auto" muted></video>
        <div class="play-indicator" id="pi-${i}"></div>
        <div class="progress-bar"  id="pb-${i}"></div>
        <div class="video-info">
          <div class="video-title">${esc(v.title)}</div>
          ${v.desc ? `<div class="video-desc">${esc(v.desc)}</div>` : ''}
        </div>
        <div class="side-actions">
          <div class="action-btn" onclick="toggleLike(${i})">
            <div class="action-icon" id="like-icon-${i}">${liked ? '❤️' : '🤍'}</div>
            <span id="like-count-${i}">${likeCount}</span>
          </div>
          ${isAdmin ? `<div class="action-btn" onclick="deleteVideo(${i})">
            <div class="action-icon">🗑️</div>
            <span>Deletar</span>
          </div>` : ''}
        </div>
      `;

      // single tap = play/pause | double tap = like
      let lastTap = 0;
      slide.addEventListener('click', e => {
        if (e.target.closest('.side-actions')) return;
        const now = Date.now();
        if (now - lastTap < 300) {
          triggerLike(i, slide);
        } else {
          const vid = slide.querySelector('video');
          const pi  = document.getElementById('pi-' + i);
          if (vid.paused) { vid.play(); pi.textContent = '▶️'; }
          else            { vid.pause(); pi.textContent = '⏸️'; }
          pi.classList.remove('pop'); void pi.offsetWidth; pi.classList.add('pop');
        }
        lastTap = now;
      });

      feed.appendChild(slide);
    });

    observeSlides();
    showMuteHint();
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---------- OBSERVER ----------
  function observeSlides() {
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        const vid = entry.target.querySelector('video');
        const i   = entry.target.dataset.index;
        if (entry.isIntersecting) {
          if (currentVid && currentVid !== vid) {
            currentVid.pause();
            currentVid.currentTime = 0;
          }
          currentVid      = vid;
          vid.muted       = isMuted;
          vid.play().catch(() => {});
          trackProgress(vid, i);
        } else {
          vid.pause();
          vid.currentTime = 0;
        }
      });
    }, { threshold: 0.65 });
    document.querySelectorAll('.video-slide').forEach(s => io.observe(s));
  }

  function trackProgress(vid, i) {
    const bar = document.getElementById('pb-' + i);
    if (!bar) return;
    const tick = () => {
      if (vid.duration) bar.style.width = (vid.currentTime / vid.duration * 100) + '%';
      if (!vid.paused)  requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  // ---------- LIKES ----------
  function toggleLike(i) {
    const v       = videos[i];
    const icon    = document.getElementById('like-icon-' + i);
    const countEl = document.getElementById('like-count-' + i);
    const key     = 'liked_' + v.id;
    let count     = likes[v.id] || 0;
    if (likes[key]) {
      count = Math.max(0, count - 1); icon.textContent = '🤍'; delete likes[key];
    } else {
      count++; icon.textContent = '❤️'; likes[key] = true;
    }
    likes[v.id] = count; countEl.textContent = count;
    localStorage.setItem('meutok_likes', JSON.stringify(likes));
  }

  function triggerLike(i, slide) {
    const icon = document.getElementById('like-icon-' + i);
    if (icon.textContent !== '❤️') toggleLike(i);
    const burst = document.createElement('div');
    burst.className = 'heart-burst'; burst.textContent = '❤️';
    slide.appendChild(burst); setTimeout(() => burst.remove(), 700);
  }

  // ---------- DELETE ----------
  function deleteVideo(i) {
    if (!confirm('Deletar "' + videos[i].title + '"?')) return;
    videos.splice(i, 1); save(); renderFeed(); showToast('Vídeo removido do feed');
  }

  // ---------- LOGIN ----------
  function openLogin() {
    if (isAdmin) { openUpload(); return; }
    document.getElementById('loginModal').classList.add('open');
    setTimeout(() => document.getElementById('adminPass').focus(), 150);
  }
  function closeLogin() {
    document.getElementById('loginModal').classList.remove('open');
    document.getElementById('adminPass').value = '';
    document.getElementById('loginError').style.display = 'none';
  }
  function checkLogin() {
    if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
      isAdmin = true; closeLogin(); renderFeed(); openUpload();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('adminPass').value = '';
    }
  }

  // ---------- UPLOAD ----------
  function openUpload()  { document.getElementById('uploadModal').classList.add('open'); }
  function closeUpload() {
    document.getElementById('uploadModal').classList.remove('open');
    document.getElementById('videoFile').value  = '';
    document.getElementById('videoTitle').value = '';
    document.getElementById('videoDesc').value  = '';
  }

  function addVideo() {
    const file  = document.getElementById('videoFile').value.trim();
    const title = document.getElementById('videoTitle').value.trim();
    const desc  = document.getElementById('videoDesc').value.trim();
    if (!file)  { showToast('Digite o nome do arquivo!'); return; }
    if (!title) { showToast('Adicione um título!'); return; }
    videos.unshift({ id: Date.now().toString(), file, title, desc });
    save(); closeUpload(); renderFeed(); showToast('Vídeo adicionado! 🎉');
  }

  function save() { localStorage.setItem('meutok_local', JSON.stringify(videos)); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  renderFeed();
</script>
</body>
</html>
