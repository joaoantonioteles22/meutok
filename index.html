<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeuTok</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111; --surface2: #161616;
    --border: #222; --accent: #ff2d55; --accent2: #00f2ea;
    --text: #f5f5f5; --muted: #666; --nav-h: 58px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow:hidden; height:100dvh; }

  nav {
    position:fixed; top:0; left:0; right:0; z-index:100; height:var(--nav-h);
    display:flex; align-items:center; gap:12px; padding:0 16px;
    background:rgba(10,10,10,.97); border-bottom:1px solid var(--border);
  }
  .logo {
    font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .search-wrap { flex:1; position:relative; max-width:380px; }
  .search-wrap input { width:100%; background:#1a1a1a; border:1.5px solid var(--border); color:var(--text); padding:8px 32px 8px 34px; border-radius:20px; font-family:'DM Sans',sans-serif; font-size:13px; outline:none; transition:border-color .2s; }
  .search-wrap input:focus { border-color:var(--accent2); }
  .search-wrap input::placeholder { color:var(--muted); }
  .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:14px; pointer-events:none; }
  .clear-btn { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); font-size:15px; cursor:pointer; display:none; }
  .nav-right { display:flex; align-items:center; gap:8px; flex-shrink:0; margin-left:auto; }
  #muteBtn { width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.08); border:none; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; }
  #muteBtn:hover { background:rgba(255,255,255,.18); }
  .nav-btn { background:none; border:1.5px solid var(--border); color:var(--text); padding:6px 14px; border-radius:20px; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; transition:all .2s; white-space:nowrap; }
  .nav-btn:hover { border-color:var(--accent); color:var(--accent); }

  #app { display:flex; height:100dvh; padding-top:var(--nav-h); }

  #sidebar { display:none; width:200px; flex-shrink:0; border-right:1px solid var(--border); flex-direction:column; background:var(--bg); }
  @media(min-width:768px){ #sidebar { display:flex; } }
  .sidebar-header { padding:12px 12px 8px; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); }
  #sidebarList { flex:1; overflow-y:auto; padding:6px; }
  #sidebarList::-webkit-scrollbar { width:3px; }
  #sidebarList::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .sidebar-item { display:flex; align-items:center; gap:8px; padding:8px; border-radius:8px; cursor:pointer; transition:background .15s; font-size:12px; font-weight:500; color:var(--muted); }
  .sidebar-item:hover { background:#1a1a1a; color:var(--text); }
  .sidebar-item.active { background:rgba(255,45,85,.1); color:var(--accent); }
  .sidebar-num { font-family:'Bebas Neue',sans-serif; font-size:14px; width:18px; text-align:center; flex-shrink:0; }
  .sidebar-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  #feed-area { flex:1; display:flex; align-items:stretch; justify-content:center; overflow:hidden; background:#0a0a0a; }
  #video-col { width:100%; max-width:400px; position:relative; }
  #feed { width:100%; height:100%; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; }
  #feed::-webkit-scrollbar { display:none; }

  .video-slide { height:calc(100dvh - var(--nav-h)); scroll-snap-align:start; position:relative; background:#000; }
  .video-slide video { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; cursor:pointer; }
  .video-slide::after { content:''; position:absolute; inset:0; pointer-events:none; z-index:1; background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 40%,transparent 68%,rgba(0,0,0,.3) 100%); }

  .video-info { position:absolute; bottom:90px; left:14px; right:70px; z-index:2; animation:fadeUp .4s ease; }
  .video-title { font-size:14px; font-weight:700; margin-bottom:4px; text-shadow:0 1px 8px rgba(0,0,0,.9); }
  .video-desc  { font-size:12px; color:rgba(255,255,255,.7); line-height:1.4; }

  /* botões laterais */
  .side-actions { position:absolute; right:10px; bottom:240px; z-index:2; display:flex; flex-direction:column; gap:14px; align-items:center; }
  .action-btn { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; user-select:none; }
  .action-icon { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.13); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; font-size:18px; transition:transform .15s,background .15s; }
  .action-btn:active .action-icon { transform:scale(1.22); background:rgba(255,45,85,.35); }
  .action-btn span { font-size:10px; color:rgba(255,255,255,.85); font-weight:500; }

  /* barra de progresso */
  .progress-wrap { position:absolute; bottom:0; left:0; right:0; z-index:4; padding:18px 0 8px; background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%); cursor:pointer; user-select:none; }
  .progress-track { position:relative; height:3px; margin:0 12px; background:rgba(255,255,255,.25); border-radius:3px; transition:height .15s; }
  .progress-wrap:hover .progress-track { height:5px; }
  .progress-fill { height:100%; border-radius:3px; width:0%; background:linear-gradient(to right,var(--accent),var(--accent2)); pointer-events:none; }
  .progress-thumb { position:absolute; top:50%; left:0%; width:12px; height:12px; border-radius:50%; background:#fff; transform:translate(-50%,-50%); opacity:0; transition:opacity .15s; pointer-events:none; }
  .progress-wrap:hover .progress-thumb { opacity:1; }
  .time-display { display:flex; justify-content:space-between; padding:5px 12px 0; font-size:10px; color:rgba(255,255,255,.7); pointer-events:none; }

  .play-indicator { position:absolute; font-size:56px; z-index:5; pointer-events:none; opacity:0; top:50%; left:50%; transform:translate(-50%, -50%); margin-top:-30px; margin-left:-30px; }
  .play-indicator.pop { animation:fadeOut .55s ease forwards; }

  /* ── COMENTÁRIOS direita (desktop) ── */
  #comments-col {
    display:none; width:280px; flex-shrink:0;
    border-left:1px solid var(--border); flex-direction:column; background:var(--surface);
  }
  @media(min-width:768px){ #comments-col { display:flex; } }

  .comments-header {
    padding:12px 16px 10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .comments-header h3 { font-size:13px; font-weight:700; }
  .comments-header-right { display:flex; align-items:center; gap:8px; }
  .comments-count { font-size:11px; color:var(--muted); background:var(--surface2); padding:2px 8px; border-radius:10px; }
  .close-comments-btn { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; line-height:1; transition:color .2s; }
  .close-comments-btn:hover { color:var(--text); }

  #commentsList { flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  #commentsList::-webkit-scrollbar { width:3px; }
  #commentsList::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  .comment-item { background:var(--surface2); border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.5; animation:fadeUp .3s ease; border:1px solid var(--border); position:relative; }
  .comment-text { color:var(--text); word-break:break-word; padding-right:20px; }
  .comment-time { font-size:10px; color:var(--muted); margin-top:4px; }
  .comment-delete {
    position:absolute; top:8px; right:8px;
    background:none; border:none; color:var(--muted);
    font-size:13px; cursor:pointer; opacity:0;
    transition:opacity .2s, color .2s; line-height:1;
  }
  .comment-item:hover .comment-delete { opacity:1; }
  .comment-delete:hover { color:var(--accent); }

  .no-comments-msg { text-align:center; color:var(--muted); font-size:12px; padding:30px 10px; }
  .no-comments-msg .icon { font-size:28px; margin-bottom:6px; }

  /* form com emoji */
  .comment-form { padding:10px 12px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px; position:relative; }
  .comment-input-wrap { position:relative; }
  .comment-form textarea {
    width:100%; background:var(--bg); border:1.5px solid var(--border); color:var(--text);
    padding:9px 36px 9px 12px; border-radius:10px; font-family:'DM Sans',sans-serif;
    font-size:13px; resize:none; height:64px; outline:none; transition:border-color .2s;
  }
  .comment-form textarea:focus { border-color:var(--accent2); }
  .comment-form textarea::placeholder { color:var(--muted); }
  .emoji-btn {
    position:absolute; right:8px; bottom:8px;
    background:none; border:none; font-size:18px; cursor:pointer;
    opacity:.6; transition:opacity .2s;
  }
  .emoji-btn:hover { opacity:1; }

  /* emoji picker */
  .emoji-picker {
    display:none; position:absolute; bottom:100%; right:0; z-index:50;
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:10px; width:240px; animation:fadeUp .2s ease;
  }
  .emoji-picker.open { display:block; }
  .emoji-grid { display:flex; flex-wrap:wrap; gap:4px; }
  .emoji-grid button { background:none; border:none; font-size:20px; cursor:pointer; padding:4px; border-radius:6px; transition:background .15s; }
  .emoji-grid button:hover { background:#1a1a1a; }

  .form-bottom { display:flex; justify-content:flex-end; }
  .send-btn { padding:7px 18px; border:none; border-radius:20px; background:linear-gradient(135deg,var(--accent),#ff6b6b); color:#fff; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:opacity .2s; }
  .send-btn:hover { opacity:.85; }

  /* modal mobile */
  #mobileCommentModal { display:none; position:fixed; inset:0; z-index:300; background:rgba(10,10,10,.97); flex-direction:column; }
  #mobileCommentModal.open { display:flex; }
  .mcm-header { padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
  .mcm-header h3 { font-size:15px; font-weight:700; }
  .mcm-close { background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; }
  #mobileCommentsList { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
  .mcm-form { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; position:relative; }
  .mcm-input-wrap { flex:1; position:relative; }
  .mcm-form textarea { width:100%; background:#1a1a1a; border:1.5px solid var(--border); color:var(--text); padding:10px 36px 10px 12px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; resize:none; height:44px; outline:none; }
  .mcm-form textarea:focus { border-color:var(--accent2); }
  .mcm-emoji-btn { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:18px; cursor:pointer; opacity:.6; }
  .mcm-emoji-picker { display:none; position:absolute; bottom:100%; right:0; z-index:50; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px; width:240px; animation:fadeUp .2s ease; }
  .mcm-emoji-picker.open { display:block; }
  .mcm-send { padding:0 16px; height:44px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-weight:700; font-size:13px; cursor:pointer; flex-shrink:0; }

  .center-msg { display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; text-align:center; padding:40px; }
  .center-msg .big-icon { font-size:52px; }
  .center-msg h2 { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--muted); }
  .center-msg p { font-size:13px; color:var(--muted); line-height:1.6; }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); backdrop-filter:blur(12px); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:30px; width:90%; max-width:400px; position:relative; animation:popIn .25s cubic-bezier(.34,1.56,.64,1); }
  .modal h2 { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:1px; margin-bottom:6px; }
  .modal p.subtitle { font-size:13px; color:var(--muted); margin-bottom:18px; line-height:1.5; }
  .modal input[type="password"],.modal input[type="text"],.modal textarea { width:100%; background:var(--bg); border:1.5px solid var(--border); color:var(--text); padding:11px 14px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:13px; margin-bottom:10px; outline:none; transition:border-color .2s; }
  .modal input:focus,.modal textarea:focus { border-color:var(--accent2); }
  .modal textarea { resize:vertical; min-height:60px; }
  .hint { font-size:11px; color:var(--muted); margin-top:-6px; margin-bottom:12px; line-height:1.5; }
  .hint code { background:#1a1a1a; padding:1px 5px; border-radius:4px; color:var(--accent2); }
  .btn-primary { width:100%; padding:13px; border:none; border-radius:10px; background:linear-gradient(135deg,var(--accent),#ff6b6b); color:#fff; font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:1px; cursor:pointer; transition:opacity .2s,transform .15s; margin-top:2px; }
  .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
  .btn-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; position:absolute; top:14px; right:16px; }
  .error-msg { color:var(--accent); font-size:12px; margin-top:-6px; margin-bottom:8px; display:none; }

  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface); border:1px solid var(--border); color:var(--text); padding:10px 22px; border-radius:30px; font-size:13px; font-weight:500; z-index:999; transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; }
  #toast.show { transform:translateX(-50%) translateY(0); }
  .heart-burst { position:absolute; font-size:72px; z-index:10; pointer-events:none; left:50%; top:40%; transform:translate(-50%,-50%); animation:heartBurst .6s ease forwards; }
  .mute-hint { position:fixed; bottom:60px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.75); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.1); color:#fff; padding:8px 18px; border-radius:30px; font-size:12px; z-index:102; animation:fadeUpC .4s ease, fadeOut2 .4s ease 3s forwards; pointer-events:none; white-space:nowrap; }

  @keyframes heartBurst { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 50%{transform:translate(-50%,-50%) scale(1.3);opacity:1} 100%{transform:translate(-50%,-50%) scale(1.5);opacity:0} }
  @keyframes fadeUp  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUpC { from{opacity:0;transform:translateX(-50%) translateY(12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes popIn   { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
  @keyframes fadeOut { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.4)} }
  @keyframes fadeOut2{ from{opacity:1} to{opacity:0} }
</style>
</head>
<body>

<nav>
  <div class="logo">MeuTok</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar por título..." oninput="onSearch(this.value)"/>
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <div class="nav-right">
    <button id="muteBtn" onclick="toggleMute()">🔇</button>
    <button class="nav-btn" id="adminNavBtn" onclick="openLogin()">+ Admin</button>
  </div>
</nav>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">Vídeos</div>
    <div id="sidebarList"></div>
  </div>

  <div id="feed-area">
    <div id="video-col">
      <div id="feed"></div>
      <div class="center-msg" id="noResults"><div class="big-icon">🔍</div><h2>Sem resultados</h2><p>Nenhum vídeo com esse título</p></div>
    </div>
  </div>

  <!-- COMENTÁRIOS desktop -->
  <div id="comments-col">
    <div class="comments-header">
      <h3>💬 Comentários</h3>
      <div class="comments-header-right">
        <span class="comments-count" id="commentsCount">0</span>
        <button class="close-comments-btn" onclick="toggleCommentsCol()" title="Fechar">✕</button>
      </div>
    </div>
    <div id="commentsList"></div>
    <div class="comment-form">
      <div class="comment-input-wrap">
        <textarea id="commentInput" placeholder="Escreva um comentário..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendComment();}"></textarea>
        <button class="emoji-btn" onclick="toggleEmojiPicker('emojiPicker')" title="Emoji">😊</button>
        <div class="emoji-picker" id="emojiPicker">
          <div class="emoji-grid" id="emojiGrid"></div>
        </div>
      </div>
      <div class="form-bottom">
        <button class="send-btn" onclick="sendComment()">Enviar ↑</button>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE COMMENTS -->
<div id="mobileCommentModal">
  <div class="mcm-header">
    <h3>💬 Comentários</h3>
    <button class="mcm-close" onclick="closeMobileComments()">✕</button>
  </div>
  <div id="mobileCommentsList"></div>
  <div class="mcm-form">
    <div class="mcm-input-wrap">
      <textarea id="mobileCommentInput" placeholder="Comentar..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendComment(true);}"></textarea>
      <button class="mcm-emoji-btn" onclick="toggleEmojiPicker('mcmEmojiPicker')">😊</button>
      <div class="mcm-emoji-picker" id="mcmEmojiPicker">
        <div class="emoji-grid" id="mcmEmojiGrid"></div>
      </div>
    </div>
    <button class="mcm-send" onclick="sendComment(true)">↑</button>
  </div>
</div>

<!-- LOGIN -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="btn-close" onclick="closeLogin()">✕</button>
    <h2>Área Admin</h2>
    <p class="subtitle">Digite a senha para acessar o painel.</p>
    <input type="password" id="adminPass" placeholder="Senha" onkeydown="if(event.key==='Enter')checkLogin()"/>
    <div class="error-msg" id="loginError">Senha incorreta!</div>
    <button class="btn-primary" onclick="checkLogin()">ENTRAR</button>
  </div>
</div>

<!-- ADD VIDEO -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <button class="btn-close" onclick="closeUpload()">✕</button>
    <h2>Novo Vídeo</h2>
    <p class="subtitle">Nome do arquivo na pasta <code>videos/</code> do repositório.</p>
    <input type="text" id="videoFile" placeholder="meu-video.mp4"/>
    <div class="hint">Ex: <code>festa.mp4</code> — com o <code>.mp4</code>!</div>
    <input type="text" id="videoTitle" placeholder="Título do vídeo"/>
    <textarea id="videoDesc" placeholder="Descrição (opcional)"></textarea>
    <button class="btn-primary" onclick="addVideo()">PUBLICAR</button>
  </div>
</div>

<div id="toast"></div>

  if (!myToken) {
    myToken = 'u_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('meutok_token', myToken);
  }

  let videosExtra   = JSON.parse(localStorage.getItem('meutok_extra') || '[]');
  let likedLocally  = JSON.parse(localStorage.getItem('meutok_liked') || '{}');
  let isAdmin       = false;
  let isMuted       = true;
  let currentVid    = null;
  let currentId     = null;
  let hintShown     = false;
  let filtered      = [];
  let searchQ       = '';
  let unsubComments = null;
  let unsubLikes    = null;
  let commentsColOpen = true;

  // emojis
  const EMOJIS = ['😀','😂','🥰','😍','🤩','😎','🥳','😜','🤔','😮','😢','😡','❤️','🔥','👏','🙌','💯','✨','🎉','🎬','👍','👎','💀','😭','🤣','😱','🥺','😏','🤗','💪','🙏','👀'];

  function buildEmojiGrid(gridId, inputId) {
    const grid = document.getElementById(gridId);
    if (!grid || grid.children.length > 0) return;
    EMOJIS.forEach(e => {
      const btn = document.createElement('button');
      btn.textContent = e;
      btn.onclick = () => {
        const input = document.getElementById(inputId);
        const pos   = input.selectionStart || input.value.length;
        input.value = input.value.slice(0, pos) + e + input.value.slice(pos);
        input.focus();
        document.getElementById(gridId).closest('.emoji-picker, .mcm-emoji-picker').classList.remove('open');
      };
      grid.appendChild(btn);
    });
  }

  function toggleEmojiPicker(pickerId) {
    const picker = document.getElementById(pickerId);
    const isDesktop = pickerId === 'emojiPicker';
    buildEmojiGrid(isDesktop ? 'emojiGrid' : 'mcmEmojiGrid', isDesktop ? 'commentInput' : 'mobileCommentInput');
    picker.classList.toggle('open');
  }
  window.toggleEmojiPicker = toggleEmojiPicker;

  // fecha emoji picker ao clicar fora
  document.addEventListener('click', e => {
    if (!e.target.closest('.emoji-btn') && !e.target.closest('.mcm-emoji-btn') &&
        !e.target.closest('.emoji-picker') && !e.target.closest('.mcm-emoji-picker')) {
      document.querySelectorAll('.emoji-picker, .mcm-emoji-picker').forEach(p => p.classList.remove('open'));
    }
  });

  function toggleCommentsCol() {
    const col = document.getElementById('comments-col');
    commentsColOpen = !commentsColOpen;
    col.style.display = commentsColOpen ? 'flex' : 'none';
  }
  window.toggleCommentsCol = toggleCommentsCol;

  function getAllVideos() { return [...VIDEOS_FIXOS, ...videosExtra]; }

  function onSearch(q) {
    searchQ = q.trim().toLowerCase();
    document.getElementById('clearBtn').style.display = q ? 'block' : 'none';
    applyFilter();
  }
  function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('clearBtn').style.display = 'none';
    searchQ = ''; applyFilter();
  }
  function applyFilter() {
    const all = getAllVideos();
    let r = searchQ ? all.filter(v => v.title.toLowerCase().startsWith(searchQ)) : [...all];
    r.sort((a,b) => a.title.localeCompare(b.title, 'pt'));
    filtered = r; renderFeed();
  }

  function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
    if (currentVid) currentVid.muted = isMuted;
  }
  window.toggleMute = toggleMute;

  function showMuteHint() {
    if (hintShown || filtered.length === 0) return;
    hintShown = true;
    const h = document.createElement('div');
    h.className = 'mute-hint'; h.textContent = '🔇 Clique em 🔇 para ativar o som';
    document.body.appendChild(h); setTimeout(() => h.remove(), 4000);
  }

  function renderFeed() {
    const feed  = document.getElementById('feed');
    const noRes = document.getElementById('noResults');
    document.getElementById('adminNavBtn').textContent = isAdmin ? '+ Adicionar' : '+ Admin';
    renderSidebar();
    feed.innerHTML = '';
    feed.style.display = noRes.style.display = 'none';
    if (filtered.length === 0) { noRes.style.display = 'flex'; return; }
    feed.style.display = 'block';

    filtered.forEach((v, i) => {
      const liked = !!likedLocally[v.id];
      const slide = document.createElement('div');
      slide.className = 'video-slide';
      slide.dataset.index = i;
      slide.dataset.id    = v.id;

      slide.innerHTML = `
        <video src="${VIDEO_FOLDER}${v.file}" loop playsinline preload="auto" muted></video>
        <div class="play-indicator" id="pi-${i}"></div>
        <div class="video-info">
          <div class="video-title">${esc(v.title)}</div>
          ${v.desc ? `<div class="video-desc">${esc(v.desc)}</div>` : ''}
        </div>
        <div class="side-actions">
          <div class="action-btn" onclick="toggleLike('${v.id}',${i})">
            <div class="action-icon" id="like-icon-${i}">${liked?'❤️':'🤍'}</div>
            <span id="like-count-${i}">0</span>
          </div>
          <div class="action-btn" onclick="openMobileComments()">
            <div class="action-icon">💬</div>
            <span>Comentar</span>
          </div>
          ${isAdmin?`<div class="action-btn" onclick="deleteVideo('${v.id}')"><div class="action-icon">🗑️</div><span>Deletar</span></div>`:''}
        </div>
        <div class="progress-wrap" id="pw-${i}">
          <div class="progress-track" id="pt-${i}">
            <div class="progress-fill" id="pb-${i}"></div>
            <div class="progress-thumb"></div>
          </div>
          <div class="time-display">
            <span id="cur-${i}">0:00</span>
            <span id="dur-${i}">0:00</span>
          </div>
        </div>
      `;

      // barra clicável
      const pw = slide.querySelector(`#pw-${i}`);
      const pt = slide.querySelector(`#pt-${i}`);
      const seekTo = (clientX) => {
        const vid = slide.querySelector('video');
        if (!vid.duration) return;
        const rect = pt.getBoundingClientRect();
        vid.currentTime = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)) * vid.duration;
      };
      // mouse drag — limpa listeners após soltar
      pw.addEventListener('mousedown', e => {
        e.preventDefault();
        e.stopPropagation();
        let isDragging = true;
        seekTo(e.clientX);
        const onMove = e => { if (isDragging) seekTo(e.clientX); };
        const onUp   = () => {
          isDragging = false;
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });
      // touch drag
      pw.addEventListener('touchstart', e => {
        e.stopPropagation();
        seekTo(e.touches[0].clientX);
        const onMove = e => { seekTo(e.touches[0].clientX); e.preventDefault(); };
        const onEnd  = () => { pw.removeEventListener('touchmove', onMove); pw.removeEventListener('touchend', onEnd); };
        pw.addEventListener('touchmove', onMove, { passive:false });
        pw.addEventListener('touchend', onEnd);
      }, { passive:true });

      let lastTap = 0;
      slide.addEventListener('click', e => {
        if (e.target.closest('.side-actions') || e.target.closest('.progress-wrap')) return;
        const now = Date.now();
        if (now - lastTap < 300) { triggerLike(v.id, i, slide); }
        else {
          const vid = slide.querySelector('video');
          const pi  = document.getElementById('pi-'+i);
          if (vid.paused) { vid.play(); pi.textContent='▶️'; }
          else            { vid.pause(); pi.textContent='⏸️'; }
          pi.classList.remove('pop'); void pi.offsetWidth; pi.classList.add('pop');
        }
        lastTap = now;
      });

      feed.appendChild(slide);
    });

    observeSlides();
    showMuteHint();
  }

  function renderSidebar() {
    const list = document.getElementById('sidebarList');
    list.innerHTML = '';
    filtered.forEach((v,i) => {
      const item = document.createElement('div');
      item.className = 'sidebar-item';
      item.innerHTML = `<span class="sidebar-num">${i+1}</span><span class="sidebar-name">${esc(v.title)}</span>`;
      item.onclick = () => document.querySelectorAll('.video-slide')[i]?.scrollIntoView({ behavior:'smooth' });
      list.appendChild(item);
    });
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtTime(s) { if(isNaN(s))return'0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return`${m}:${sec.toString().padStart(2,'0')}`; }

  function observeSlides() {
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        const vid = entry.target.querySelector('video');
        const i   = parseInt(entry.target.dataset.index);
        const id  = entry.target.dataset.id;
        if (entry.isIntersecting) {
          if (currentVid && currentVid !== vid) { currentVid.pause(); currentVid.currentTime=0; }
          currentVid = vid; currentId = id;
          vid.muted = isMuted;
          vid.play().catch(()=>{});
          trackProgress(vid, i);
          document.querySelectorAll('.sidebar-item').forEach((el,j) => el.classList.toggle('active', j===i));
          loadComments(id);
          loadLikes(id, i);
        } else {
          vid.pause(); vid.currentTime = 0;
        }
      });
    }, { threshold:0.65 });
    document.querySelectorAll('.video-slide').forEach(s => io.observe(s));
  }

  function trackProgress(vid, i) {
    const fill  = document.getElementById('pb-'+i);
    const cur   = document.getElementById('cur-'+i);
    const dur   = document.getElementById('dur-'+i);
    const thumb = fill ? fill.parentElement.querySelector('.progress-thumb') : null;

    const update = () => {
      if (!vid.duration) return;
      const pct = (vid.currentTime / vid.duration * 100);
      if (fill)  fill.style.width = pct + '%';
      if (thumb) thumb.style.left = pct + '%';
      if (cur)   cur.textContent  = fmtTime(vid.currentTime);
    };

    vid.addEventListener('loadedmetadata', () => { if(dur) dur.textContent = fmtTime(vid.duration); }, { once:true });
    vid.addEventListener('timeupdate', update);
    vid.addEventListener('play', () => requestAnimationFrame(function tick(){
      update();
      if (!vid.paused) requestAnimationFrame(tick);
    }));
    requestAnimationFrame(update);
  }

  // ── LIKES ──
  function loadLikes(videoId, slideIndex) {
    if (!window._firebaseReady) { window.addEventListener('firebaseReady', ()=>loadLikes(videoId,slideIndex),{once:true}); return; }
    if (unsubLikes) { unsubLikes(); unsubLikes=null; }
    const ref = window._doc(window._db, 'likes', videoId);
    unsubLikes = window._onSnapshot(ref, snap => {
      const count = snap.exists() ? (snap.data().count||0) : 0;
      const el = document.getElementById('like-count-'+slideIndex);
      if (el) el.textContent = count;
    });
  }

  async function toggleLike(videoId, slideIndex) {
    if (!window._firebaseReady) return;
    const icon  = document.getElementById('like-icon-'+slideIndex);
    const already = !!likedLocally[videoId];
    if (already) {
      delete likedLocally[videoId]; icon.textContent='🤍';
      await window._setDoc(window._doc(window._db,'likes',videoId),{count:window._increment(-1)},{merge:true});
    } else {
      likedLocally[videoId]=true; icon.textContent='❤️';
      await window._setDoc(window._doc(window._db,'likes',videoId),{count:window._increment(1)},{merge:true});
    }
    localStorage.setItem('meutok_liked', JSON.stringify(likedLocally));
  }
  window.toggleLike = toggleLike;

  function triggerLike(videoId, slideIndex, slide) {
    const icon = document.getElementById('like-icon-'+slideIndex);
    if (icon.textContent !== '❤️') toggleLike(videoId, slideIndex);
    const burst = document.createElement('div');
    burst.className='heart-burst'; burst.textContent='❤️';
    slide.appendChild(burst); setTimeout(()=>burst.remove(), 700);
  }

  // ── COMENTÁRIOS ──
  function loadComments(videoId) {
    if (!window._firebaseReady) { window.addEventListener('firebaseReady',()=>loadComments(videoId),{once:true}); return; }
    if (unsubComments) { unsubComments(); unsubComments=null; }
    try {
      const q = window._query(
        window._collection(window._db,'comments'),
        window._where('videoId','==',videoId),
        window._orderBy('createdAt','asc')
      );
      unsubComments = window._onSnapshot(q, snap => {
        renderComments(snap.docs.map(d=>({id:d.id,...d.data()})));
      }, err=>console.error(err));
    } catch(e) { console.error(e); }
  }

  function renderComments(comments) {
    const list   = document.getElementById('commentsList');
    const mobile = document.getElementById('mobileCommentsList');
    document.getElementById('commentsCount').textContent = comments.length;

    if (comments.length === 0) {
      const html = `<div class="no-comments-msg"><div class="icon">💬</div><div>Nenhum comentário ainda.<br>Seja o primeiro!</div></div>`;
      list.innerHTML = mobile.innerHTML = html;
      return;
    }

    const makeHtml = (c) => {
      const isMine = c.token === myToken;
      return `<div class="comment-item">
        <div class="comment-text">${esc(c.text)}</div>
        <div class="comment-time">${formatTime(c.createdAt)}</div>
        ${isMine ? `<button class="comment-delete" onclick="deleteComment('${c.id}')" title="Excluir">🗑</button>` : ''}
      </div>`;
    };

    list.innerHTML   = comments.map(makeHtml).join('');
    mobile.innerHTML = comments.map(makeHtml).join('');
    list.scrollTop   = list.scrollHeight;
    mobile.scrollTop = mobile.scrollHeight;
  }

  async function deleteComment(commentId) {
    if (!confirm('Excluir seu comentário?')) return;
    try {
      await window._deleteDoc(window._doc(window._db,'comments',commentId));
    } catch(e) { showToast('Erro ao excluir'); }
  }
  window.deleteComment = deleteComment;

  function formatTime(ts) {
    if (!ts) return 'agora';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }

  async function sendComment(mobile=false) {
    const inputId = mobile ? 'mobileCommentInput' : 'commentInput';
    const input   = document.getElementById(inputId);
    const text    = input.value.trim();
    if (!text || !currentId || !window._firebaseReady) return;
    input.value = '';
    try {
      await window._addDoc(window._collection(window._db,'comments'), {
        videoId: currentId, text, token: myToken, createdAt: window._serverTimestamp()
      });
    } catch(e) { showToast('Erro ao enviar comentário'); }
  }
  window.sendComment = sendComment;

  function deleteVideo(id) {
    const isFixed = VIDEOS_FIXOS.find(v=>v.id===id);
    if (isFixed) { showToast('Vídeos fixos não podem ser deletados aqui'); return; }
    if (!confirm('Deletar este vídeo?')) return;
    videosExtra = videosExtra.filter(x=>x.id!==id);
    localStorage.setItem('meutok_extra', JSON.stringify(videosExtra));
    applyFilter(); showToast('Vídeo removido');
  }
  window.deleteVideo = deleteVideo;

  function openMobileComments()  { document.getElementById('mobileCommentModal').classList.add('open'); }
  function closeMobileComments() { document.getElementById('mobileCommentModal').classList.remove('open'); }
  window.openMobileComments  = openMobileComments;
  window.closeMobileComments = closeMobileComments;

  function openLogin()  { if(isAdmin){openUpload();return;} document.getElementById('loginModal').classList.add('open'); setTimeout(()=>document.getElementById('adminPass').focus(),150); }
  function closeLogin() { document.getElementById('loginModal').classList.remove('open'); document.getElementById('adminPass').value=''; document.getElementById('loginError').style.display='none'; }
  function checkLogin() {
    if (document.getElementById('adminPass').value===ADMIN_PASSWORD) { isAdmin=true; closeLogin(); renderFeed(); openUpload(); }
    else { document.getElementById('loginError').style.display='block'; document.getElementById('adminPass').value=''; }
  }
  window.openLogin=openLogin; window.closeLogin=closeLogin; window.checkLogin=checkLogin;

  function openUpload()  { document.getElementById('uploadModal').classList.add('open'); }
  function closeUpload() { document.getElementById('uploadModal').classList.remove('open'); document.getElementById('videoFile').value=''; document.getElementById('videoTitle').value=''; document.getElementById('videoDesc').value=''; }
  function addVideo() {
    const file  = document.getElementById('videoFile').value.trim();
    const title = document.getElementById('videoTitle').value.trim();
    const desc  = document.getElementById('videoDesc').value.trim();
    if (!file)  { showToast('Digite o nome do arquivo!'); return; }
    if (!title) { showToast('Adicione um título!'); return; }
    videosExtra.unshift({ id:'extra_'+Date.now(), file, title, desc });
    localStorage.setItem('meutok_extra', JSON.stringify(videosExtra));
    closeUpload(); applyFilter(); showToast('Vídeo adicionado! 🎉');
  }
  window.openUpload=openUpload; window.closeUpload=closeUpload; window.addVideo=addVideo;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }
  window.showToast=showToast; window.onSearch=onSearch; window.clearSearch=clearSearch;

  applyFilter();
  window.addEventListener('firebaseReady', () => {
    if (currentId) { loadComments(currentId); loadLikes(currentId,0); }
  });
</script>
</body>
</html>
